<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>French Numbers Practice</title>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="340a17ac-2b34-4e23-aa85-928c6ab6eafd"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
            color: #222;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1a1a2e;
        }

        .toggle-row {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            padding: 8px 20px;
            border: 2px solid #c0c4cc;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            color: #555;
            transition: all 0.15s;
        }

        .mode-btn:hover { border-color: #4f6ef7; color: #4f6ef7; }
        .mode-btn.active { background: #4f6ef7; border-color: #4f6ef7; color: white; }

        .range-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .range-btn {
            padding: 8px 18px;
            border: 2px solid #c0c4cc;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            color: #555;
            transition: all 0.15s;
        }

        .range-btn:hover { border-color: #4f6ef7; color: #4f6ef7; }
        .range-btn.active { background: #4f6ef7; border-color: #4f6ef7; color: white; }

        .answer-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            justify-content: center;
        }

        .answer-btn {
            padding: 7px 18px;
            border: 2px solid #c0c4cc;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: #555;
            transition: all 0.15s;
        }

        .answer-btn:hover { border-color: #4f6ef7; color: #4f6ef7; }
        .answer-btn.active { background: #4f6ef7; border-color: #4f6ef7; color: white; }

        .card {
            background: white;
            border-radius: 16px;
            padding: 36px 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 460px;
            text-align: center;
        }

        .score {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 28px;
        }

        .score strong { color: #333; }

        .speak-btn {
            background: #4f6ef7;
            border: none;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            cursor: pointer;
            font-size: 2rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            transition: background 0.15s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(79, 110, 247, 0.35);
        }

        .speak-btn:hover { background: #3a57e8; transform: scale(1.05); }
        .speak-btn:active { transform: scale(0.96); }
        .speak-btn.speaking { background: #6c47ff; animation: pulse 0.8s infinite; }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 12px rgba(108, 71, 255, 0.4); }
            50% { box-shadow: 0 4px 24px rgba(108, 71, 255, 0.7); }
        }

        .hint {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 20px;
        }

        .sentence-display {
            font-size: 1rem;
            color: #444;
            background: #f5f7ff;
            border-radius: 8px;
            padding: 10px 16px;
            margin-bottom: 16px;
            display: none;
        }

        .sentence-display.visible { display: block; }

        .sentence-actions {
            display: none;
            gap: 8px;
            justify-content: center;
            margin-bottom: 16px;
        }

        .sentence-actions.visible { display: flex; }

        .btn-ghost {
            padding: 7px 16px;
            border: 2px solid #c0c4cc;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: #555;
            transition: all 0.15s;
        }

        .btn-ghost:hover { border-color: #4f6ef7; color: #4f6ef7; }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .input-row.hidden { visibility: hidden; }

        #answer-input {
            font-size: 1.5rem;
            text-align: center;
            width: 220px;
            padding: 10px 16px;
            border: 2px solid #dde2f0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.15s;
        }

        #answer-input.french-mode { font-size: 1.1rem; width: 280px; }

        #answer-input:focus { border-color: #4f6ef7; }

        #submit-btn {
            padding: 10px 22px;
            background: #4f6ef7;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        #submit-btn:hover { background: #3a57e8; }

        .feedback {
            min-height: 28px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 8px;
            padding: 6px 12px;
            display: inline-block;
        }

        .feedback.wrong { color: #c0392b; background: #fdecea; }
    </style>
</head>
<body>
    <h1>French Numbers Practice</h1>

    <div class="toggle-row">
        <button class="mode-btn active" data-mode="number">Number Only</button>
        <button class="mode-btn" data-mode="sentence">Number in a Sentence</button>
    </div>

    <div class="range-selector">
        <button class="range-btn active" data-min="0" data-max="10">0 – 10</button>
        <button class="range-btn" data-min="0" data-max="100">0 – 100</button>
        <button class="range-btn" data-min="0" data-max="1000">0 – 1 000</button>
        <button class="range-btn" data-min="0" data-max="1000000">All</button>
    </div>

    <div class="answer-selector">
        <span style="font-size:0.9rem;color:#888;align-self:center;">Answer in:</span>
        <button class="answer-btn active" data-answer="digits">🔢 Digits</button>
        <button class="answer-btn" data-answer="french">🔤 French Words</button>
    </div>

    <div class="card">
        <div class="score">
            Correct: <strong id="correct">0</strong> / <strong id="total">0</strong>
            <span id="pct"></span>
        </div>

        <button class="speak-btn" id="speak-btn" title="Click to hear">🔊</button>

        <p class="hint" id="hint">Press 🔊 to start</p>

        <div class="sentence-display" id="sentence-display"></div>
        <div class="sentence-actions" id="sentence-actions">
            <button class="btn-ghost" id="show-sentence-btn">Show Sentence</button>
            <button class="btn-ghost" id="skip-btn">Skip</button>
        </div>

        <div class="input-row hidden" id="input-row">
            <input type="text" inputmode="numeric" id="answer-input" autocomplete="off" autocapitalize="none">
            <button id="submit-btn">Check</button>
        </div>

        <div class="feedback" id="feedback"></div>
    </div>

    <script>
        const ranges       = document.querySelectorAll('.range-btn');
        const modeBtns     = document.querySelectorAll('.mode-btn');
        const answerBtns   = document.querySelectorAll('.answer-btn');
        const speakBtn     = document.getElementById('speak-btn');
        const answerInput  = document.getElementById('answer-input');
        const submitBtn    = document.getElementById('submit-btn');
        const feedback     = document.getElementById('feedback');
        const correctEl    = document.getElementById('correct');
        const totalEl      = document.getElementById('total');
        const pctEl        = document.getElementById('pct');
        const hintEl       = document.getElementById('hint');
        const inputRow     = document.getElementById('input-row');
        const sentenceDisplay  = document.getElementById('sentence-display');
        const sentenceActions  = document.getElementById('sentence-actions');
        const showSentenceBtn  = document.getElementById('show-sentence-btn');
        const skipBtn          = document.getElementById('skip-btn');

        const TTS_URL = 'https://conjugaison-production.up.railway.app/api/tts';

        let currentNumber   = null;
        let currentText     = null;
        let currentSentence = '';
        let currentMin      = 0;
        let currentMax      = 10;
        let currentMode     = 'number';   // 'number' | 'sentence'
        let answerMode      = 'digits';   // 'digits' | 'french'
        let correctCount    = 0;
        let totalCount      = 0;
        let started         = false;

        // ── French number → words ─────────────────────────────────────────────

        const UNITS = ['', 'un', 'deux', 'trois', 'quatre', 'cinq', 'six', 'sept', 'huit', 'neuf',
                       'dix', 'onze', 'douze', 'treize', 'quatorze', 'quinze', 'seize',
                       'dix-sept', 'dix-huit', 'dix-neuf'];
        const TENS  = ['', 'dix', 'vingt', 'trente', 'quarante', 'cinquante', 'soixante'];

        function numberToFrench(n) {
            if (n === 0) return 'zéro';

            function cvt(n, terminal) {
                if (n === 0) return '';
                if (n < 20)  return UNITS[n];

                if (n < 70) {
                    const t = Math.floor(n / 10), u = n % 10;
                    if (u === 0) return TENS[t];
                    return TENS[t] + (u === 1 ? ' et un' : '-' + UNITS[u]);
                }

                if (n < 80) {
                    const r = n - 60;
                    return r === 11 ? 'soixante et onze' : 'soixante-' + UNITS[r];
                }

                if (n < 100) {
                    const r = n - 80;
                    if (r === 0) return terminal ? 'quatre-vingts' : 'quatre-vingt';
                    return 'quatre-vingt-' + cvt(r, terminal);
                }

                if (n < 1000) {
                    const h = Math.floor(n / 100), r = n % 100;
                    const base = (h === 1 ? 'cent' : UNITS[h] + ' cent') +
                                 (r === 0 && terminal ? 's' : '');
                    return r === 0 ? base : base + ' ' + cvt(r, terminal);
                }

                if (n < 1000000) {
                    const t = Math.floor(n / 1000), r = n % 1000;
                    const base = (t === 1 ? 'mille' : cvt(t, false) + ' mille');
                    return r === 0 ? base : base + ' ' + cvt(r, terminal);
                }

                const m = Math.floor(n / 1000000), r = n % 1000000;
                const base = (m === 1 ? 'un' : cvt(m, false)) + (m > 1 ? ' millions' : ' million');
                return r === 0 ? base : base + ' ' + cvt(r, terminal);
            }

            return cvt(n, true);
        }

        // ── Answer normalisation ──────────────────────────────────────────────

        function normalizeFrench(s) {
            return s
                .toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')  // strip accents
                .replace(/-/g, ' ')
                .replace(/\s+/g, ' ')
                .trim()
                .replace(/\bvingts\b/g, 'vingt')   // accept with/without plural s
                .replace(/\bcents\b/g,  'cent')
                .replace(/\bmillions\b/g, 'million');
        }

        // ── Sentence building blocks ──────────────────────────────────────────

        const nouns    = ['voitures','personnes','élèves','chats','livres','enfants',
                          'oiseaux','arbres','étudiants','vélos','fleurs','chiens',
                          'tables','touristes','voisins','bouteilles','sacs','chaises'];
        const places   = ['dans la rue','dans le parc','dans la salle','dans le jardin',
                          'dans le bus','sur le parking',"dans l'école",'dans le train',
                          'sur la plage','dans le café','dans le magasin','dans la maison'];
        const family   = ['Mon père','Ma mère','Mon frère','Ma sœur','Mon oncle',
                          'Ma tante','Mon cousin','Ma cousine','Mon ami','Mon voisin'];
        const subjects  = ['Je','Il','Elle','Nous','Mon ami','Ma sœur','Mon frère'];
        const haveVerbs = {Je:'ai',Il:'a',Elle:'a',Nous:'avons','Mon ami':'a','Ma sœur':'a','Mon frère':'a'};

        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        const templates = [
            n => `Il y a ${n} ${pick(nouns)} ${pick(places)}.`,
            n => { const s = pick(subjects); return `${s} ${haveVerbs[s]} ${n} ${pick(nouns)}.`; },
            n => `${pick(family)} a ${n} ans.`,
            n => `Ça coûte ${n} euros.`,
            n => `Le train part dans ${n} minutes.`,
            n => `Il fait ${n} degrés aujourd'hui.`,
            n => `J'habite à ${n} kilomètres d'ici.`,
            n => `J'ai payé ${n} euros.`,
            n => `Le vol dure ${n} heures.`,
            n => `Il y a ${n} étages dans cet immeuble.`,
            n => `J'attends depuis ${n} minutes.`,
            n => `Le billet coûte ${n} euros.`,
            n => `La ville a ${n} habitants.`,
            n => `Il reste ${n} jours avant les vacances.`,
            n => `Le bus numéro ${n} est en retard.`,
        ];

        // ── Speech ────────────────────────────────────────────────────────────

        let currentAudio = null;

        async function speak(text) {
            if (currentAudio) { currentAudio.pause(); currentAudio = null; }
            speakBtn.classList.add('speaking');
            try {
                const res = await fetch(TTS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const blob = await res.blob();
                const url  = URL.createObjectURL(blob);
                currentAudio = new Audio(url);
                currentAudio.onended = () => speakBtn.classList.remove('speaking');
                currentAudio.onerror = () => speakBtn.classList.remove('speaking');
                currentAudio.play();
            } catch (e) {
                speakBtn.classList.remove('speaking');
            }
        }

        // ── UI helpers ────────────────────────────────────────────────────────

        function updateInputMode() {
            if (answerMode === 'french') {
                answerInput.inputMode = 'text';
                answerInput.classList.add('french-mode');
            } else {
                answerInput.inputMode = 'numeric';
                answerInput.classList.remove('french-mode');
            }
        }

        function showInputUI() {
            inputRow.classList.remove('hidden');
            hintEl.textContent = answerMode === 'french'
                ? 'Type the number in French words, then press Enter or click Check'
                : 'Type the number you hear, then press Enter or click Check';
            answerInput.focus();
        }

        function updateSentenceModeUI() {
            if (currentMode === 'sentence') {
                sentenceActions.classList.add('visible');
            } else {
                sentenceActions.classList.remove('visible');
                sentenceDisplay.classList.remove('visible');
                sentenceDisplay.textContent = '';
                showSentenceBtn.textContent = 'Show Sentence';
            }
        }

        function resetUI() {
            hintEl.textContent = 'Press 🔊 to hear the next question';
            inputRow.classList.add('hidden');
            feedback.textContent = '';
            feedback.className = 'feedback';
        }

        // ── Game logic ────────────────────────────────────────────────────────

        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function prepareQuestion() {
            currentNumber = randomInt(currentMin, currentMax);
            currentSentence = currentMode === 'sentence' ? pick(templates)(currentNumber) : '';
            currentText = currentMode === 'sentence' ? currentSentence : String(currentNumber);
            sentenceDisplay.classList.remove('visible');
            sentenceDisplay.textContent = '';
            showSentenceBtn.textContent = 'Show Sentence';
        }

        function nextQuestion(autoSpeak = true) {
            prepareQuestion();
            answerInput.value = '';
            answerInput.disabled = false;
            feedback.textContent = '';
            feedback.className = 'feedback';
            if (autoSpeak) { showInputUI(); speak(currentText); }
        }

        function checkAnswer() {
            const raw = answerInput.value.trim();
            if (raw === '') return;

            let correct;
            if (answerMode === 'digits') {
                correct = parseInt(raw, 10) === currentNumber;
            } else {
                correct = normalizeFrench(raw) === normalizeFrench(numberToFrench(currentNumber));
            }

            totalCount++;

            if (correct) {
                correctCount++;
                updateScore();
                nextQuestion(true);
            } else {
                feedback.textContent = 'Listen Again';
                feedback.className = 'feedback wrong';
                updateScore();
                speak(currentText);
                answerInput.value = '';
                answerInput.focus();
            }
        }

        function updateScore() {
            correctEl.textContent = correctCount;
            totalEl.textContent   = totalCount;
            if (totalCount > 0)
                pctEl.textContent = `(${Math.round(correctCount / totalCount * 100)}%)`;
        }

        // ── Event listeners ───────────────────────────────────────────────────

        modeBtns.forEach(btn => btn.addEventListener('click', () => {
            modeBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMode = btn.dataset.mode;
            updateSentenceModeUI();
            if (started) { nextQuestion(false); resetUI(); }
        }));

        ranges.forEach(btn => btn.addEventListener('click', () => {
            ranges.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMin = parseInt(btn.dataset.min);
            currentMax = parseInt(btn.dataset.max);
            if (started) { nextQuestion(false); resetUI(); }
        }));

        answerBtns.forEach(btn => btn.addEventListener('click', () => {
            answerBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            answerMode = btn.dataset.answer;
            updateInputMode();
            if (started) { nextQuestion(false); resetUI(); }
        }));

        speakBtn.addEventListener('click', () => {
            if (!started) {
                started = true;
                prepareQuestion();
                updateSentenceModeUI();
            }
            showInputUI();
            speak(currentText);
        });

        showSentenceBtn.addEventListener('click', () => {
            if (sentenceDisplay.classList.contains('visible')) {
                sentenceDisplay.classList.remove('visible');
                sentenceDisplay.textContent = '';
                showSentenceBtn.textContent = 'Show Sentence';
            } else {
                sentenceDisplay.textContent = currentSentence;
                sentenceDisplay.classList.add('visible');
                showSentenceBtn.textContent = 'Hide Sentence';
            }
        });

        skipBtn.addEventListener('click', () => nextQuestion(true));
        submitBtn.addEventListener('click', checkAnswer);
        answerInput.addEventListener('keydown', e => { if (e.key === 'Enter') checkAnswer(); });
    </script>
</body>
</html>
